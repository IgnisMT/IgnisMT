name: Generar Estadisticas
on:
  # Se ejecuta a la medianoche todos los días automáticamente
  schedule: [{cron: "0 0 * * *"}]
  # Te permite ejecutarlo manualmente desde la pestaña Actions
  workflow_dispatch:
  # Se actualiza cuando haces un cambio en este repositorio
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ignismt
          template: classic
          base: "" # Lo dejamos vacío para que genere SOLO la tarjeta de lenguajes
          config_timezone: America/Costa_Rica
          
          # 🚀 CONFIGURACIÓN DE LENGUAJES
          plugin_languages: yes
          # 🧊 CALENDARIO ISOMÉTRICO 3D
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages_limit: 15 # ¡Aquí está la magia! Puedes subir este número
          plugin_languages_colors: github
          plugin_languages_threshold: 0% # Asegura que cuente hasta los lenguajes que menos usas
          plugin_languages_details: bytes-size, percentage # Muestra el peso y el %
          
          # Opcional: Si quieres que ignore HTML y CSS y solo muestre lógica, descomenta la línea de abajo:
          # plugin_languages_categories: programming
